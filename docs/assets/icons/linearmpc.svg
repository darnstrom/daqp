<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="LinearMPC">
  <!-- Polytopic partition with Julia colors -->
  <!-- 4 polyhedral regions meeting at interior point (12,11) -->
  <!-- Region 1: top-left — Julia purple -->
  <polygon points="0,0 11,0 12,11 0,15" fill="#9558B2"/>
  <!-- Region 2: top-right — Julia red -->
  <polygon points="11,0 24,0 24,11 12,11" fill="#CB3C33"/>
  <!-- Region 3: bottom-right — Julia green -->
  <polygon points="24,11 24,24 13,24 12,11" fill="#389826"/>
  <!-- Region 4: bottom-left — deeper purple (4-color map) -->
  <polygon points="0,15 12,11 13,24 0,24" fill="#6B3FA0"/>
  <!-- Partition boundary lines in white -->
  <line x1="11" y1="0"  x2="12" y2="11" stroke="white" stroke-width="0.7"/>
  <line x1="0"  y1="15" x2="12" y2="11" stroke="white" stroke-width="0.7"/>
  <line x1="12" y1="11" x2="24" y2="11" stroke="white" stroke-width="0.7"/>
  <line x1="12" y1="11" x2="13" y2="24" stroke="white" stroke-width="0.7"/>
</svg>
